<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background circle -->
  <circle cx="512" cy="512" r="400" fill="#0f172a"/>

  <!-- Three dice arranged in a mixer/variety pattern -->
  <!-- Die 1 - top left -->
  <g transform="translate(180, 180) scale(0.6)">
    <rect x="0" y="0" width="200" height="200" rx="20" fill="#e2e8f0"/>
    <circle cx="50" cy="50" r="15" fill="#64748b"/>
    <circle cx="150" cy="50" r="15" fill="#64748b"/>
    <circle cx="100" cy="100" r="15" fill="#64748b"/>
    <circle cx="50" cy="150" r="15" fill="#64748b"/>
    <circle cx="150" cy="150" r="15" fill="#64748b"/>
  </g>

  <!-- Die 2 - top right -->
  <g transform="translate(640, 180) scale(0.6)">
    <rect x="0" y="0" width="200" height="200" rx="20" fill="#e2e8f0"/>
    <circle cx="50" cy="50" r="15" fill="#64748b"/>
    <circle cx="150" cy="50" r="15" fill="#64748b"/>
    <circle cx="50" cy="100" r="15" fill="#64748b"/>
    <circle cx="150" cy="100" r="15" fill="#64748b"/>
    <circle cx="50" cy="150" r="15" fill="#64748b"/>
    <circle cx="150" cy="150" r="15" fill="#64748b"/>
  </g>

  <!-- Die 3 - bottom center -->
  <g transform="translate(410, 640) scale(0.6)">
    <rect x="0" y="0" width="200" height="200" rx="20" fill="#e2e8f0"/>
    <circle cx="100" cy="50" r="15" fill="#64748b"/>
    <circle cx="50" cy="100" r="15" fill="#64748b"/>
    <circle cx="150" cy="100" r="15" fill="#64748b"/>
    <circle cx="100" cy="150" r="15" fill="#64748b"/>
  </g>
</svg>
