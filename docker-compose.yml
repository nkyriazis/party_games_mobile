version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Better watch performance in some Docker setups
    stdin_open: true
    tty: true

  production:
    build:
      context: .
      target: production
    ports:
      - "8080:80"

  android-build:
    build:
      context: .
      dockerfile: Dockerfile.android
    volumes:
      - ./build-output:/app/build-output
    command: ["sh", "-c", "cp /app/android/app/build/outputs/apk/debug/app-debug.apk /app/build-output/tick-tack-boom.apk && echo 'Done! APK is in build-output/tick-tack-boom.apk'"]
